<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="login-container">
    <div class="login-card">
        <h2><i class="fas fa-hotel"></i> Hotel Login</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="userId" class="form-label">User ID / Username / Email</label>
                <input type="text" class="form-control" id="userId" placeholder="Enter User ID, Username, or Email"
                    minlength="5" maxlength="50" required>
                <div class="invalid-feedback"></div>
                <small class="text-muted">You can login with User ID, Username, or Email address</small>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" maxlength="30" required>
                <div class="invalid-feedback"></div>
                <small class="text-muted">Maximum 30 characters. Must include uppercase, lowercase, and special
                    character</small>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>

            <div class="text-center mt-3">
                <a href="register.html" class="text-decoration-none">Don't have an account? Register</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
