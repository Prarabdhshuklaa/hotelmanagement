<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="register-container">
    <div class="register-card">
        <h2><i class="fas fa-hotel"></i> Hotel Registration</h2>
        <form id="registerForm">
            <!-- Personal Information -->
            <h5 class="mb-3">Personal Information</h5>
            
            <div class="mb-3">
                <label for="name" class="form-label">Customer Name</label>
                <input type="text" class="form-control" id="name" maxlength="50" required>
                <div class="invalid-feedback"></div>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
                <div class="invalid-feedback"></div>
            </div>
            
            <div class="mb-3">
                <label for="mobile" class="form-label">Mobile Number</label>
                <div class="input-group">
                    <select class="form-select" id="countryCode" style="max-width: 100px;">
                        <option value="+91">+91</option>
                        <option value="+1">+1</option>
                        <option value="+44">+44</option>
                        <option value="+61">+61</option>
                    </select>
                    <input type="text" class="form-control" id="mobile" maxlength="10" pattern="[0-9]{10}" required>
                    <div class="invalid-feedback"></div>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea class="form-control" id="address" rows="3" required></textarea>
                <div class="invalid-feedback"></div>
            </div>
            
            <!-- Username and Password -->
            <h5 class="mb-3 mt-4">Username and Password</h5>
            
            <div class="mb-3">
                <label for="customerId" class="form-label">Customer ID</label>
                <input type="text" class="form-control" id="customerId" minlength="5" maxlength="20" required>
                <div class="invalid-feedback"></div>
                <small class="text-muted">5-20 characters</small>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" maxlength="30" required>
                <div class="invalid-feedback"></div>
                <small class="text-muted">Maximum 30 characters. Must include uppercase, lowercase, and special character</small>
            </div>
            
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" maxlength="30" required>
                <div class="invalid-feedback"></div>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Register</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
            
            <div class="text-center mt-3">
                <a href="index.html" class="text-decoration-none">Already have an account? Login</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
